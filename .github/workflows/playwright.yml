name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Run nightly to detect upstream API changes
  schedule:
    - cron: '0 6 * * *'
              
jobs:
  test:
    name: Run API tests
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright API tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Test result summary
        if: always()
        run: |
          echo "### API Test Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "Download the **playwright-report** artifact above to view the full HTML report." >> $GITHUB_STEP_SUMMARY